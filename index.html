<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>متابعة الطلبات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a1a2e;
  --accent: #e94560;
  --accent2: #0f3460;
  --green: #06d6a0;
  --yellow: #f4a61e;
  --red: #ef476f;
  --blue: #118ab2;
  --bg: #f0f2f5;
  --white: #fff;
  --border: #dde3ec;
  --text: #1a202c;
  --muted: #718096;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--primary); padding: 1rem; }
.login-card { background: var(--white); border-radius: 20px; padding: 2rem; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-logo { text-align: center; margin-bottom: 1.5rem; }
.login-icon { width: 52px; height: 52px; background: var(--accent); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
.login-icon svg { width: 26px; height: 26px; fill: white; }
.login-logo h1 { font-size: 20px; font-weight: 700; color: var(--primary); }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
.fg input { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Cairo',sans-serif; font-size: 14px; background: var(--bg); color: var(--text); }
.fg input:focus { outline: none; border-color: var(--accent); background: white; }
.login-btn { width: 100%; padding: 11px; background: var(--primary); color: white; border: none; border-radius: 8px; font-family: 'Cairo',sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.login-btn:hover { background: var(--accent2); }
.login-err { color: var(--red); font-size: 12px; text-align: center; margin-top: 8px; }
.login-hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 10px; }
.app { display: none; flex-direction: column; min-height: 100vh; }
.app.active { display: flex; }
.topbar { background: var(--primary); color: white; height: 52px; padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-logo { font-size: 15px; font-weight: 700; }
.nav-pills { display: flex; gap: 2px; }
.nav-pill { background: transparent; border: none; color: rgba(255,255,255,0.6); padding: 5px 10px; border-radius: 6px; font-family: 'Cairo',sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; }
.nav-pill.active, .nav-pill:hover { background: rgba(255,255,255,0.15); color: white; }
.topbar-right { display: flex; align-items: center; gap: 6px; }
.topbar-user { font-size: 11px; color: rgba(255,255,255,0.5); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.icon-btn { background: transparent; border: none; color: rgba(255,255,255,0.7); cursor: pointer; padding: 4px 7px; border-radius: 6px; font-size: 12px; }
.icon-btn:hover { background: rgba(255,255,255,0.15); }
.main { flex: 1; padding: 1rem; }
.stats-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 1rem; }
.stat { background: var(--white); border-radius: var(--radius); padding: 10px 8px; text-align: center; border-top: 3px solid transparent; }
.stat.s-all { border-color: var(--primary); }
.stat.s-done { border-color: var(--green); }
.stat.s-pending { border-color: var(--yellow); }
.stat.s-late { border-color: var(--red); }
.stat.s-edit { border-color: var(--blue); }
.stat-n { font-size: 22px; font-weight: 700; line-height: 1; }
.stat.s-all .stat-n { color: var(--primary); }
.stat.s-done .stat-n { color: var(--green); }
.stat.s-pending .stat-n { color: var(--yellow); }
.stat.s-late .stat-n { color: var(--red); }
.stat.s-edit .stat-n { color: var(--blue); }
.stat-l { font-size: 10px; color: var(--muted); margin-top: 2px; }
.today-box { background: var(--white); border-radius: var(--radius); padding: 12px; margin-bottom: 1rem; }
.today-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.sheet-wrap { background: var(--white); border-radius: var(--radius); overflow: hidden; }
.month-row { display: flex; gap: 4px; overflow-x: auto; padding: 10px 12px 0; scrollbar-width: none; }
.month-row::-webkit-scrollbar { display: none; }
.mtab { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 6px; font-family: 'Cairo',sans-serif; font-size: 11px; cursor: pointer; white-space: nowrap; }
.mtab.active { background: var(--primary); color: white; border-color: var(--primary); }
.sheet-toolbar { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.search-inp { flex: 1; min-width: 100px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px; font-family: 'Cairo',sans-serif; font-size: 13px; background: var(--bg); }
.search-inp:focus { outline: none; border-color: var(--primary); }
.ftabs { display: flex; gap: 4px; flex-wrap: wrap; }
.ftab { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 20px; font-family: 'Cairo',sans-serif; font-size: 11px; cursor: pointer; }
.ftab.active { background: var(--primary); color: white; border-color: var(--primary); }
.sheet-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table.sheet { width: 100%; border-collapse: collapse; min-width: 750px; }
table.sheet th { background: #f7f9fc; padding: 8px 8px; font-size: 11px; font-weight: 600; color: var(--muted); text-align: right; border-bottom: 2px solid var(--border); white-space: nowrap; }
table.sheet td { padding: 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.sheet tr:last-child td { border-bottom: none; }
table.sheet tr:hover td { background: #f8faff; }
table.sheet tr.row-late td { background: #fff5f7 !important; }
table.sheet tr.row-pending td { background: #fffbf0 !important; }
.ci { width: 100%; padding: 7px 8px; border: none; background: transparent; font-family: 'Cairo',sans-serif; font-size: 13px; color: var(--text); }
.ci:focus { outline: 2px solid var(--accent2); outline-offset: -2px; background: white; border-radius: 3px; }
.cs { width: 100%; padding: 6px 6px; border: none; background: transparent; font-family: 'Cairo',sans-serif; font-size: 12px; color: var(--text); cursor: pointer; }
.cs:focus { outline: 2px solid var(--accent2); outline-offset: -2px; background: white; border-radius: 3px; }
.cd { width: 100%; padding: 5px 6px; border: none; background: transparent; font-family: 'Cairo',sans-serif; font-size: 12px; color: var(--text); }
.cd:focus { outline: 2px solid var(--accent2); outline-offset: -2px; background: white; border-radius: 3px; }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.b-done { background: #e0faf3; color: #05a87f; }
.b-pending { background: #fff3d6; color: #b97d0a; }
.b-late { background: #ffe0e8; color: #c9184a; }
.b-edit { background: #deeeff; color: #0277bd; }
.del-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; color: #ccc; font-size: 14px; }
.del-btn:hover { color: var(--red); }
.add-row-btn { width: 100%; padding: 10px; background: var(--bg); border: none; color: var(--muted); font-family: 'Cairo',sans-serif; font-size: 13px; cursor: pointer; border-top: 1px solid var(--border); }
.add-row-btn:hover { background: #eef2ff; color: var(--primary); }
.set-wrap { max-width: 520px; }
.set-card { background: var(--white); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 12px; }
.set-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.set-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
.set-row label { font-size: 13px; flex: 1; }
.set-row input[type=number], .set-row input[type=text] { width: 90px; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 7px; font-family: 'Cairo',sans-serif; font-size: 13px; text-align: center; }
.day-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.day-btn { padding: 5px 11px; border: 1.5px solid var(--border); border-radius: 20px; font-family: 'Cairo',sans-serif; font-size: 12px; cursor: pointer; background: var(--bg); color: var(--muted); }
.day-btn.on { background: var(--primary); color: white; border-color: var(--primary); }
.save-btn { background: var(--primary); color: white; border: none; padding: 10px 28px; border-radius: 8px; font-family: 'Cairo',sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
.user-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.rm-btn { background: var(--red); color: white; border: none; padding: 2px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.add-user-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.add-user-row input { flex: 1; min-width: 120px; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 7px; font-family: 'Cairo',sans-serif; font-size: 13px; }
.add-user-row button { background: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 7px; font-family: 'Cairo',sans-serif; font-size: 13px; cursor: pointer; }
.hidden { display: none !important; }
.empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
      <h1 id="loginTitle">متابعة الطلبات</h1>
    </div>
    <div class="fg"><label>البريد الإلكتروني</label><input type="email" id="loginEmail" placeholder="example@email.com"></div>
    <div class="fg"><label>كلمة المرور</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <p class="login-err hidden" id="loginErr">البريد أو كلمة المرور غير صحيحة</p>
    <p class="login-hint">للتجربة: admin@demo.com / 1234</p>
  </div>
</div>

<div class="app" id="appWrap">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="topbar-logo" id="appTitle">متابعة الطلبات</span>
      <div class="nav-pills">
        <button class="nav-pill active" onclick="showTab('dashboard')" id="tp-dashboard">الرئيسية</button>
        <button class="nav-pill" onclick="showTab('orders')" id="tp-orders">الطلبات</button>
        <button class="nav-pill" onclick="showTab('settings')" id="tp-settings">الإعدادات</button>
      </div>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topUser"></span>
      <button class="icon-btn" onclick="toggleLang()">ع/EN</button>
      <button class="icon-btn" onclick="doLogout()">⏻</button>
    </div>
  </div>

  <div class="main">
    <div id="pg-dashboard">
      <div class="stats-row">
        <div class="stat s-all"><div class="stat-n" id="st-total">0</div><div class="stat-l" id="stl-all">الكل</div></div>
        <div class="stat s-done"><div class="stat-n" id="st-done">0</div><div class="stat-l" id="stl-done">منجز</div></div>
        <div class="stat s-pending"><div class="stat-n" id="st-pending">0</div><div class="stat-l" id="stl-pending">انتظار</div></div>
        <div class="stat s-late"><div class="stat-n" id="st-late">0</div><div class="stat-l" id="stl-late">متأخر</div></div>
        <div class="stat s-edit"><div class="stat-n" id="st-edit">0</div><div class="stat-l" id="stl-edit">تعديل</div></div>
      </div>
      <div class="today-box">
        <h3 id="todayTitle">طلبات اليوم والمتأخرة</h3>
        <div id="todayList"></div>
      </div>
    </div>

    <div id="pg-orders" class="hidden">
      <div class="sheet-wrap">
        <div class="month-row" id="monthRow"></div>
        <div class="sheet-toolbar">
          <input class="search-inp" type="text" id="searchInp" placeholder="🔍 بحث..." oninput="renderSheet()">
          <div class="ftabs">
            <button class="ftab active" onclick="setFilter('all')" id="ft-all">الكل</button>
            <button class="ftab" onclick="setFilter('Pending')" id="ft-Pending">Pending</button>
            <button class="ftab" onclick="setFilter('Late')" id="ft-Late">Late</button>
            <button class="ftab" onclick="setFilter('Done')" id="ft-Done">Done</button>
            <button class="ftab" onclick="setFilter('Edit')" id="ft-Edit">Edit</button>
          </div>
        </div>
        <div class="sheet-scroll">
          <table class="sheet">
            <thead><tr>
              <th style="min-width:80px" id="th-id">Account ID</th>
              <th style="min-width:100px" id="th-name">الاسم</th>
              <th style="min-width:85px" id="th-type">النوع</th>
              <th style="min-width:120px" id="th-order">تاريخ الطلب</th>
              <th style="min-width:55px" id="th-un">U/N</th>
              <th style="min-width:120px" id="th-due">موعد التسليم</th>
              <th style="min-width:75px" id="th-day">اليوم</th>
              <th style="min-width:95px" id="th-status">الحالة</th>
              <th style="min-width:120px" id="th-note">ملاحظة</th>
              <th style="width:34px"></th>
            </tr></thead>
            <tbody id="sheetBody"></tbody>
          </table>
        </div>
        <button class="add-row-btn" onclick="addRow()" id="addRowBtn">+ إضافة طلب</button>
      </div>
    </div>

    <div id="pg-settings" class="hidden">
      <div class="set-wrap">
        <div class="set-card">
          <h3 id="sh-store">إعدادات المتجر</h3>
          <div class="set-row"><label id="sh-storename">اسم المتجر</label><input type="text" id="cfg-store" style="width:180px;" placeholder="متجري"></div>
        </div>
        <div class="set-card">
          <h3 id="sh-days">أيام التسليم</h3>
          <div class="set-row"><label id="sh-u">مستعجل (U) — أيام</label><input type="number" id="cfg-u" value="2" min="1"></div>
          <div class="set-row"><label id="sh-n">عادي (N) — أيام</label><input type="number" id="cfg-n" value="8" min="1"></div>
        </div>
        <div class="set-card">
          <h3 id="sh-hol">أيام الإجازة</h3>
          <div class="day-grid" id="dayGrid"></div>
        </div>
        <div class="set-card">
          <h3 id="sh-users">المستخدمون</h3>
          <div id="userList"></div>
          <div class="add-user-row">
            <input type="email" id="nu-email" placeholder="email@example.com">
            <input type="password" id="nu-pass" placeholder="باسورد">
            <button onclick="addUser()" id="sh-adduser">إضافة</button>
          </div>
        </div>
        <button class="save-btn" onclick="saveSettings()" id="sh-save">حفظ الإعدادات</button>
      </div>
    </div>
  </div>
</div>

<script>
const DAR=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const DEN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MAR=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const MEN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let lang='ar', currentUser=null, currentFilter='all';
let currentMonth=new Date().getMonth(), currentYear=new Date().getFullYear();

let users=JSON.parse(localStorage.getItem('mo_users')||'[]');
if(!users.length){users=[{email:'admin@demo.com',pass:'1234',role:'admin'}];saveUsers();}
let orders=JSON.parse(localStorage.getItem('mo_orders')||'[]');
let cfg=JSON.parse(localStorage.getItem('mo_cfg')||'{"u":2,"n":8,"hol":[5,6],"store":""}');

function saveUsers(){localStorage.setItem('mo_users',JSON.stringify(users));}
function saveOrders(){localStorage.setItem('mo_orders',JSON.stringify(orders));}
function saveCfg(){localStorage.setItem('mo_cfg',JSON.stringify(cfg));}

const TR={
  ar:{title:'متابعة الطلبات',dash:'الرئيسية',ord:'الطلبات',set:'الإعدادات',
    stA:'الكل',stD:'منجز',stP:'انتظار',stL:'متأخر',stE:'تعديل',
    tod:'طلبات اليوم والمتأخرة',todE:'لا توجد طلبات اليوم',
    thId:'Account ID',thN:'الاسم',thT:'النوع',thO:'تاريخ الطلب',thU:'U/N',thD:'موعد التسليم',thDy:'اليوم',thS:'الحالة',thNo:'ملاحظة',
    addR:'+ إضافة طلب',noO:'لا توجد طلبات',
    shSt:'إعدادات المتجر',shSN:'اسم المتجر',shDy:'أيام التسليم',shU:'مستعجل (U) — أيام',shN:'عادي (N) — أيام',
    shH:'أيام الإجازة',shUs:'المستخدمون',shAu:'إضافة',shSv:'حفظ الإعدادات',
    days:DAR,months:MAR},
  en:{title:'Order Tracker',dash:'Dashboard',ord:'Orders',set:'Settings',
    stA:'All',stD:'Done',stP:'Pending',stL:'Late',stE:'Edit',
    tod:"Today's & Overdue",todE:'No orders today',
    thId:'Account ID',thN:'Name',thT:'Type',thO:'Order Date',thU:'U/N',thD:'Due Date',thDy:'Day',thS:'Status',thNo:'Note',
    addR:'+ Add Order',noO:'No orders',
    shSt:'Store Settings',shSN:'Store Name',shDy:'Delivery Days',shU:'Urgent (U) — Days',shN:'Normal (N) — Days',
    shH:'Holiday Days',shUs:'Users',shAu:'Add',shSv:'Save Settings',
    days:DEN,months:MEN}
};
const t=k=>TR[lang][k]||k;

function applyLang(){
  const isAr=lang==='ar';
  document.documentElement.lang=lang;
  document.documentElement.dir=isAr?'rtl':'ltr';
  const ids={appTitle:'title',loginTitle:'title','tp-dashboard':'dash','tp-orders':'ord','tp-settings':'set',
    'stl-all':'stA','stl-done':'stD','stl-pending':'stP','stl-late':'stL','stl-edit':'stE',
    todayTitle:'tod','th-id':'thId','th-name':'thN','th-type':'thT','th-order':'thO',
    'th-un':'thU','th-due':'thD','th-day':'thDy','th-status':'thS','th-note':'thNo',
    addRowBtn:'addR','sh-store':'shSt','sh-storename':'shSN','sh-days':'shDy',
    'sh-u':'shU','sh-n':'shN','sh-hol':'shH','sh-users':'shUs','sh-adduser':'shAu','sh-save':'shSv'};
  Object.entries(ids).forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.textContent=t(k);});
  renderDayGrid();renderMonthRow();renderSheet();renderDashboard();
}
function toggleLang(){lang=lang==='ar'?'en':'ar';applyLang();}

function doLogin(){
  const email=document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass=document.getElementById('loginPass').value;
  const user=users.find(u=>u.email.toLowerCase()===email&&u.pass===pass);
  if(user){
    currentUser=user;
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('appWrap').classList.add('active');
    document.getElementById('topUser').textContent=user.email;
    document.getElementById('loginErr').classList.add('hidden');
    loadCfgUI();renderDashboard();renderMonthRow();
  }else{document.getElementById('loginErr').classList.remove('hidden');}
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){currentUser=null;document.getElementById('loginWrap').style.display='flex';document.getElementById('appWrap').classList.remove('active');}

function showTab(tab){
  ['dashboard','orders','settings'].forEach(t=>{
    document.getElementById('pg-'+t).classList.add('hidden');
    document.getElementById('tp-'+t).classList.remove('active');
  });
  document.getElementById('pg-'+tab).classList.remove('hidden');
  document.getElementById('tp-'+tab).classList.add('active');
  if(tab==='orders'){renderMonthRow();renderSheet();}
  if(tab==='dashboard')renderDashboard();
  if(tab==='settings')loadCfgUI();
}

function loadCfgUI(){
  document.getElementById('cfg-store').value=cfg.store||'';
  document.getElementById('cfg-u').value=cfg.u;
  document.getElementById('cfg-n').value=cfg.n;
  renderDayGrid();renderUserList();
}

function renderDayGrid(){
  const days=t('days');
  document.getElementById('dayGrid').innerHTML=days.map((d,i)=>
    `<button class="day-btn ${(cfg.hol||[]).includes(i)?'on':''}" onclick="toggleDay(${i})">${d}</button>`
  ).join('');
}
function toggleDay(i){
  if(!cfg.hol)cfg.hol=[];
  const idx=cfg.hol.indexOf(i);
  if(idx>=0)cfg.hol.splice(idx,1);else cfg.hol.push(i);
  renderDayGrid();
}
function saveSettings(){
  cfg.store=document.getElementById('cfg-store').value;
  cfg.u=parseInt(document.getElementById('cfg-u').value)||2;
  cfg.n=parseInt(document.getElementById('cfg-n').value)||8;
  saveCfg();
  alert(lang==='ar'?'تم الحفظ ✓':'Saved ✓');
}
function renderUserList(){
  document.getElementById('userList').innerHTML=users.map((u,i)=>`
    <div class="user-item">
      <span>${u.email} ${u.role==='admin'?'👑':''}</span>
      ${u.email!==currentUser.email?`<button class="rm-btn" onclick="removeUser(${i})">×</button>`:''}
    </div>`).join('');
}
function addUser(){
  const email=document.getElementById('nu-email').value.trim();
  const pass=document.getElementById('nu-pass').value;
  if(!email||!pass)return;
  if(users.find(u=>u.email.toLowerCase()===email.toLowerCase()))return alert(lang==='ar'?'موجود بالفعل':'Already exists');
  users.push({email,pass,role:'user'});saveUsers();
  document.getElementById('nu-email').value='';document.getElementById('nu-pass').value='';
  renderUserList();
}
function removeUser(i){users.splice(i,1);saveUsers();renderUserList();}

function calcDue(od,un){
  const days=un==='U'?cfg.u:cfg.n;
  const hol=cfg.hol||[5,6];
  let d=new Date(od),added=0;
  while(added<days){d.setDate(d.getDate()+1);if(!hol.includes(d.getDay()))added++;}
  return d.toISOString().split('T')[0];
}

function getMonthKeys(){
  const keys=new Set();
  const now=new Date();keys.add(`${now.getFullYear()}-${now.getMonth()}`);
  orders.forEach(o=>{if(o.od){const d=new Date(o.od);keys.add(`${d.getFullYear()}-${d.getMonth()}`);}});
  return[...keys].map(k=>{const[y,m]=k.split('-');return{year:+y,month:+m};})
    .sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
}
function renderMonthRow(){
  const months=t('months');
  document.getElementById('monthRow').innerHTML=getMonthKeys().map(k=>
    `<button class="mtab ${k.month===currentMonth&&k.year===currentYear?'active':''}"
      onclick="setMonth(${k.month},${k.year})">${months[k.month]} ${k.year}</button>`
  ).join('');
}
function setMonth(m,y){currentMonth=m;currentYear=y;renderMonthRow();renderSheet();}

function setFilter(f){
  currentFilter=f;
  ['all','Pending','Late','Done','Edit'].forEach(ff=>document.getElementById('ft-'+ff)?.classList.remove('active'));
  document.getElementById('ft-'+f)?.classList.add('active');
  renderSheet();
}

function renderSheet(){
  const search=(document.getElementById('searchInp')?.value||'').toLowerCase();
  const today=new Date();today.setHours(0,0,0,0);
  const rows=orders.filter(o=>{
    if(o.od){const d=new Date(o.od);if(d.getMonth()!==currentMonth||d.getFullYear()!==currentYear)return false;}
    else return false;
    if(currentFilter!=='all'&&o.status!==currentFilter)return false;
    if(search&&!Object.values(o).some(v=>String(v).toLowerCase().includes(search)))return false;
    return true;
  });

  const days=t('days');
  const tbody=document.getElementById('sheetBody');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="10" class="empty">${t('noO')}</td></tr>`;return;}

  tbody.innerHTML=rows.map(o=>{
    const due=o.dd?new Date(o.dd):null;
    const dueD=due?new Date(due):null;if(dueD)dueD.setHours(0,0,0,0);
    const isLate=dueD&&dueD<today&&o.status!=='Done';
    const dayName=o.dd?days[new Date(o.dd).getDay()]:'';
    const bc={Done:'b-done',Pending:'b-pending',Late:'b-late',Edit:'b-edit'}[o.status]||'b-pending';
    return`<tr class="${isLate?'row-late':o.status==='Pending'?'row-pending':''}" data-id="${o.id}">
      <td><input class="ci" value="${o.aid||''}" onchange="uf('${o.id}','aid',this.value)" placeholder="ID"></td>
      <td><input class="ci" value="${o.name||''}" onchange="uf('${o.id}','name',this.value)"></td>
      <td><select class="cs" onchange="uf('${o.id}','type',this.value)">
        <option ${o.type==='خاص'?'selected':''}>خاص</option>
        <option ${o.type==='معروض'?'selected':''}>معروض</option>
        <option ${o.type==='أخرى'?'selected':''}>أخرى</option>
      </select></td>
      <td><input class="cd" type="date" value="${o.od||''}" onchange="updateOD('${o.id}',this.value)"></td>
      <td><select class="cs" onchange="updateUN('${o.id}',this.value)">
        <option ${o.un==='U'?'selected':''} value="U">U</option>
        <option ${o.un==='N'?'selected':''} value="N">N</option>
      </select></td>
      <td><input class="cd" type="date" value="${o.dd||''}" onchange="uf('${o.id}','dd',this.value);renderSheet()"></td>
      <td style="padding:7px 8px;font-size:12px;color:var(--muted);white-space:nowrap;">${dayName}</td>
      <td><select class="cs ${bc}" onchange="uf('${o.id}','status',this.value);renderSheet();renderDashboard()">
        <option ${o.status==='Pending'?'selected':''}>Pending</option>
        <option ${o.status==='Done'?'selected':''}>Done</option>
        <option ${o.status==='Edit'?'selected':''}>Edit</option>
        <option ${o.status==='Late'?'selected':''}>Late</option>
      </select></td>
      <td><input class="ci" value="${o.note||''}" onchange="uf('${o.id}','note',this.value)" placeholder="..."></td>
      <td><button class="del-btn" onclick="delOrder('${o.id}')">🗑</button></td>
    </tr>`;
  }).join('');
}

function uf(id,field,val){const o=orders.find(o=>o.id===id);if(o){o[field]=val;saveOrders();}}
function updateOD(id,val){const o=orders.find(o=>o.id===id);if(!o)return;o.od=val;if(o.un)o.dd=calcDue(val,o.un);saveOrders();renderSheet();}
function updateUN(id,val){const o=orders.find(o=>o.id===id);if(!o)return;o.un=val;if(o.od)o.dd=calcDue(o.od,val);saveOrders();renderSheet();}

function addRow(){
  const today=new Date().toISOString().split('T')[0];
  orders.push({id:Date.now().toString(),aid:'',name:'',type:'خاص',od:today,un:'N',dd:calcDue(today,'N'),status:'Pending',note:'',createdBy:currentUser?.email||''});
  saveOrders();
  const d=new Date(today);currentMonth=d.getMonth();currentYear=d.getFullYear();
  renderMonthRow();renderSheet();
  setTimeout(()=>{const rows=document.querySelectorAll('#sheetBody tr');const last=rows[rows.length-1];if(last)last.querySelector('.ci')?.focus();},50);
}

function delOrder(id){
  if(!confirm(lang==='ar'?'حذف؟':'Delete?'))return;
  orders=orders.filter(o=>o.id!==id);saveOrders();renderSheet();renderDashboard();
}

function renderDashboard(){
  const today=new Date();today.setHours(0,0,0,0);
  document.getElementById('st-total').textContent=orders.length;
  document.getElementById('st-done').textContent=orders.filter(o=>o.status==='Done').length;
  document.getElementById('st-pending').textContent=orders.filter(o=>o.status==='Pending').length;
  document.getElementById('st-late').textContent=orders.filter(o=>o.status==='Late'||(o.dd&&new Date(o.dd)<today&&o.status!=='Done')).length;
  document.getElementById('st-edit').textContent=orders.filter(o=>o.status==='Edit').length;

  const due=orders.filter(o=>{
    if(o.status==='Done'||!o.dd)return false;
    const d=new Date(o.dd);d.setHours(0,0,0,0);return d<=today;
  });
  const list=document.getElementById('todayList');
  if(!due.length){list.innerHTML=`<div class="empty">${t('todE')}</div>`;return;}
  const days=t('days');
  list.innerHTML=`<table style="width:100%;border-collapse:collapse;">
    <thead><tr>${['thId','thN','thD','thS'].map(k=>`<th style="text-align:right;padding:5px 8px;font-size:11px;color:var(--muted);">${t(k)}</th>`).join('')}</tr></thead>
    <tbody>${due.map(o=>{
      const d=new Date(o.dd);d.setHours(0,0,0,0);const over=d<today;
      const bc={Done:'b-done',Pending:'b-pending',Late:'b-late',Edit:'b-edit'}[o.status]||'b-pending';
      return`<tr style="${over?'background:#fff5f7':''}">
        <td style="padding:5px 8px;font-size:13px;font-weight:600;">${o.aid||'-'}</td>
        <td style="padding:5px 8px;font-size:13px;">${o.name||'-'}</td>
        <td style="padding:5px 8px;font-size:12px;color:${over?'var(--red)':'var(--muted)'};">${o.dd} ${over?'⚠️':''}</td>
        <td style="padding:5px 8px;"><span class="badge ${bc}">${o.status}</span></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

applyLang();
</script>
</body>
</html>
