<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>متابعة الطلبات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#1a1a2e;--g:#06d6a0;--y:#f4a61e;--r:#ef476f;--b:#118ab2;--bg:#f0f2f5;--w:#fff;--br:#e2e8f0;--t:#1a202c;--m:#718096;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:13px;}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--p);padding:1rem;}
.lc{background:var(--w);border-radius:18px;padding:2rem;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.li{width:50px;height:50px;background:#e94560;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.li svg{width:24px;height:24px;fill:white;}
.lc h1{text-align:center;font-size:20px;font-weight:700;color:var(--p);margin-bottom:1.5rem;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--m);margin-bottom:4px;}
.fg input{width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:8px;font-family:'Cairo',sans-serif;font-size:14px;background:var(--bg);color:var(--t);}
.fg input:focus{outline:none;border-color:#e94560;background:white;}
.lb{width:100%;padding:11px;background:var(--p);color:white;border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.lb:hover{background:#0f3460;}
.lerr{color:var(--r);font-size:12px;text-align:center;margin-top:8px;}
.lhnt{text-align:center;font-size:12px;color:var(--m);margin-top:8px;}
.app{display:none;flex-direction:column;min-height:100vh;}
.app.on{display:flex;}
.tb{background:var(--p);height:50px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tb-logo{color:white;font-size:14px;font-weight:700;}
.np{display:flex;gap:2px;}
.np button{background:transparent;border:none;color:rgba(255,255,255,0.55);padding:5px 10px;border-radius:6px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;}
.np button.on,.np button:hover{background:rgba(255,255,255,0.15);color:white;}
.tb-r{display:flex;align-items:center;gap:6px;}
.tb-u{font-size:11px;color:rgba(255,255,255,0.4);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ib{background:transparent;border:none;color:rgba(255,255,255,0.6);cursor:pointer;padding:4px 6px;border-radius:5px;font-size:12px;}
.ib:hover{background:rgba(255,255,255,0.15);}
.mn{flex:1;padding:12px;}
.sr{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;}
.sc{background:white;border-radius:8px;padding:10px 6px;text-align:center;border-top:3px solid #ddd;}
.sc.s0{border-color:var(--p)}.sc.s1{border-color:var(--g)}.sc.s2{border-color:var(--y)}.sc.s3{border-color:var(--r)}.sc.s4{border-color:var(--b)}
.sn{font-size:22px;font-weight:700;line-height:1;}
.sc.s0 .sn{color:var(--p)}.sc.s1 .sn{color:var(--g)}.sc.s2 .sn{color:var(--y)}.sc.s3 .sn{color:var(--r)}.sc.s4 .sn{color:var(--b)}
.sl{font-size:10px;color:var(--m);margin-top:2px;}
.tb2{background:white;border-radius:8px;padding:12px;margin-bottom:12px;}
.tb2 h3{font-size:13px;font-weight:700;margin-bottom:8px;}
.sw{background:white;border-radius:8px;overflow:hidden;border:1px solid var(--br);}
.mb{display:flex;background:#f8f9fa;border-bottom:1px solid var(--br);overflow-x:auto;scrollbar-width:none;padding:0 4px;}
.mb::-webkit-scrollbar{display:none;}
.mt{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--m);padding:8px 12px;font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;white-space:nowrap;}
.mt.on{color:var(--p);border-bottom-color:var(--p);font-weight:700;background:white;}
.st2{padding:8px 10px;border-bottom:1px solid #f0f2f5;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.si{flex:1;min-width:80px;padding:6px 9px;border:1px solid var(--br);border-radius:6px;font-family:'Cairo',sans-serif;font-size:12px;background:#f7f9fc;}
.si:focus{outline:none;border-color:var(--p);}
.ft{display:flex;gap:3px;flex-wrap:wrap;}
.ftb{background:transparent;border:1px solid var(--br);color:var(--m);padding:4px 9px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;}
.ftb.on{background:var(--p);color:white;border-color:var(--p);}
.ss{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.sh{width:100%;border-collapse:collapse;min-width:660px;table-layout:fixed;}
table.sh th{background:var(--p);padding:7px 7px;font-size:10px;color:rgba(255,255,255,0.7);font-weight:600;text-align:right;border-left:1px solid rgba(255,255,255,0.08);white-space:nowrap;}
table.sh th:first-child{border-left:none;color:rgba(255,255,255,0.3);text-align:center;}
table.sh td{padding:0;border-bottom:1px solid #f0f2f5;border-left:1px solid #f0f2f5;vertical-align:middle;}
table.sh td:first-child{text-align:center;font-size:10px;color:#bbb;background:#f8f9fa;border-left:none;padding:3px 0;}
table.sh tr:hover td{background:#f5f8ff!important;}
table.sh tr:hover td:first-child{background:#eaeef8!important;}
table.sh tr.rl td{background:#fff5f7!important;}
table.sh tr.rl td:first-child{background:#ffe8ed!important;}
table.sh tr.rp td{background:#fffbf0!important;}
table.sh tr.rp td:first-child{background:#fff5e0!important;}
table.sh tr.rd td{background:#f0fff8!important;}
table.sh tr.rd td:first-child{background:#e0f5ec!important;}
.ci{width:100%;height:30px;padding:0 7px;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:11px;color:var(--t);}
.ci:focus{outline:2px solid var(--p);outline-offset:-2px;background:white;}
.cd{width:100%;height:30px;padding:0 6px;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:11px;color:#555;cursor:pointer;}
.cd:focus{outline:2px solid var(--p);outline-offset:-2px;background:white;}
.cs{width:100%;height:30px;padding:0 4px;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:11px;color:#555;cursor:pointer;}
.cs:focus{outline:2px solid var(--p);outline-offset:-2px;}
.un{width:100%;height:28px;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;color:#bbb;padding:0 4px;}
.un.u{color:#c9184a;}.un.n{color:#05a87f;}
.st{width:100%;height:28px;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;color:#bbb;padding:0 4px;}
.st.done{color:#05a87f;}.st.pending{color:#b97d0a;}.st.late{color:#c9184a;}.st.edit{color:#0277bd;}
.setw{max-width:500px;}
.setc{background:white;border-radius:8px;padding:1.25rem;margin-bottom:10px;}
.setc h3{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--br);}
.setr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
.setr label{font-size:12px;flex:1;}
.setr input[type=number],.setr input[type=text]{width:90px;padding:7px 10px;border:1.5px solid var(--br);border-radius:6px;font-family:'Cairo',sans-serif;font-size:13px;text-align:center;}
.dg{display:flex;flex-wrap:wrap;gap:6px;}
.db{padding:5px 11px;border:1.5px solid var(--br);border-radius:20px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;background:var(--bg);color:var(--m);}
.db.on{background:var(--p);color:white;border-color:var(--p);}
.svb{background:var(--p);color:white;border:none;padding:10px 28px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
.ui{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--br);font-size:12px;}
.rb{background:var(--r);color:white;border:none;padding:2px 10px;border-radius:5px;font-size:11px;cursor:pointer;}
.aur{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.aur input{flex:1;min-width:100px;padding:8px 10px;border:1.5px solid var(--br);border-radius:6px;font-family:'Cairo',sans-serif;font-size:12px;}
.aur button{background:var(--p);color:white;border:none;padding:8px 14px;border-radius:6px;font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;}
.hidden{display:none!important;}
.empty{text-align:center;padding:2rem;color:var(--m);font-size:12px;}
</style>
</head>
<body>
<div class="lw" id="lw">
  <div class="lc">
    <div class="li"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
    <h1 id="ltit">متابعة الطلبات</h1>
    <div class="fg"><label id="lem">البريد الإلكتروني</label><input type="email" id="le" placeholder="example@email.com"></div>
    <div class="fg"><label id="lpa">كلمة المرور</label><input type="password" id="lp" placeholder="••••••••"></div>
    <button class="lb" onclick="doLogin()" id="lbtn">دخول</button>
    <p class="lerr hidden" id="lerr">البريد أو كلمة المرور غير صحيحة</p>
    <p class="lhnt" id="lhnt">للتجربة: admin@demo.com / 1234</p>
  </div>
</div>
<div class="app" id="app">
  <div class="tb">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="tb-logo" id="apit">متابعة الطلبات</span>
      <div class="np">
        <button onclick="showTab('dash')" id="tp-dash">الرئيسية</button>
        <button onclick="showTab('orders')" id="tp-orders">الطلبات</button>
        <button onclick="showTab('settings')" id="tp-settings">الإعدادات</button>
      </div>
    </div>
    <div class="tb-r">
      <span class="tb-u" id="tbu"></span>
      <button class="ib" onclick="toggleLang()">ع/EN</button>
      <button class="ib" onclick="doLogout()">⏻</button>
    </div>
  </div>
  <div class="mn">
    <div id="pg-dash">
      <div class="sr">
        <div class="sc s0"><div class="sn" id="st0">0</div><div class="sl" id="sl0">الكل</div></div>
        <div class="sc s1"><div class="sn" id="st1">0</div><div class="sl" id="sl1">منجز</div></div>
        <div class="sc s2"><div class="sn" id="st2">0</div><div class="sl" id="sl2">انتظار</div></div>
        <div class="sc s3"><div class="sn" id="st3">0</div><div class="sl" id="sl3">متأخر</div></div>
        <div class="sc s4"><div class="sn" id="st4">0</div><div class="sl" id="sl4">تعديل</div></div>
      </div>
      <div class="tb2"><h3 id="todH">طلبات اليوم والمتأخرة</h3><div id="todL"></div></div>
    </div>
    <div id="pg-orders" class="hidden">
      <div class="sw">
        <div class="mb" id="mbar"></div>
        <div class="st2">
          <input class="si" type="text" id="sin" placeholder="🔍 بحث..." oninput="renderSheet()">
          <div class="ft">
            <button class="ftb on" onclick="setF('all')" id="ft-all">الكل</button>
            <button class="ftb" onclick="setF('Pending')" id="ft-Pending">Pending</button>
            <button class="ftb" onclick="setF('Late')" id="ft-Late">Late</button>
            <button class="ftb" onclick="setF('Done')" id="ft-Done">Done</button>
            <button class="ftb" onclick="setF('Edit')" id="ft-Edit">Edit</button>
          </div>
        </div>
        <div class="ss">
          <table class="sh">
            <thead><tr>
              <th style="width:26px">#</th>
              <th style="width:76px" id="th0">Account ID</th>
              <th style="width:100px" id="th1">الاسم</th>
              <th style="width:75px" id="th2">النوع</th>
              <th style="width:110px" id="th3">تاريخ الطلب</th>
              <th style="width:48px" id="th4">U/N</th>
              <th style="width:110px" id="th5">موعد التسليم</th>
              <th style="width:68px" id="th6">اليوم</th>
              <th style="width:80px" id="th7">الحالة</th>
              <th id="th8">ملاحظة</th>
            </tr></thead>
            <tbody id="shb"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="pg-settings" class="hidden">
      <div class="setw">
        <div class="setc"><h3 id="sh0">إعدادات المتجر</h3><div class="setr"><label id="sh1">اسم المتجر</label><input type="text" id="cfgs" style="width:180px;" placeholder="متجري"></div></div>
        <div class="setc"><h3 id="sh2">أيام التسليم</h3><div class="setr"><label id="sh3">مستعجل (U) — أيام</label><input type="number" id="cfgu" value="2" min="1"></div><div class="setr"><label id="sh4">عادي (N) — أيام</label><input type="number" id="cfgn" value="8" min="1"></div></div>
        <div class="setc"><h3 id="sh5">أيام الإجازة</h3><div class="dg" id="dg"></div></div>
        <div class="setc"><h3 id="sh6">المستخدمون</h3><div id="ul"></div><div class="aur"><input type="email" id="nue" placeholder="email@example.com"><input type="password" id="nup" placeholder="باسورد"><button onclick="addUser()" id="sh7">إضافة</button></div></div>
        <button class="svb" onclick="saveSettings()" id="sh8">حفظ الإعدادات</button>
      </div>
    </div>
  </div>
</div>
<script>
const DAR=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const DEN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MAR=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const MEN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let lang='ar',cu=null,cf='all',cm=new Date().getMonth(),cy=new Date().getFullYear();
let users=JSON.parse(localStorage.getItem('mou')||'[]');
if(!users.length){users=[{email:'admin@demo.com',pass:'1234',role:'admin'}];su();}
let rows=JSON.parse(localStorage.getItem('mor')||'[]');
let cfg=JSON.parse(localStorage.getItem('moc')||'{"u":2,"n":8,"hol":[5,6],"store":""}');
function su(){localStorage.setItem('mou',JSON.stringify(users));}
function sr(){localStorage.setItem('mor',JSON.stringify(rows));}
function sc(){localStorage.setItem('moc',JSON.stringify(cfg));}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function pad(n){return String(n).padStart(2,'0');}
function getMonthRows(y,m){
  const ex={};
  rows.forEach(r=>{if(r.y===y&&r.m===m)ex[r.d]=r;});
  const res=[];
  for(let d=1;d<=dim(y,m);d++){
    const ds=y+'-'+pad(m+1)+'-'+pad(d);
    res.push(ex[d]||{id:y+'-'+m+'-'+d,y,m,d,ds,aid:'',name:'',type:'',un:'',dd:'',status:'',note:'',_e:true});
  }
  return res;
}
function ensureRow(y,m,d){
  let r=rows.find(r=>r.y===y&&r.m===m&&r.d===d);
  if(!r){const ds=y+'-'+pad(m+1)+'-'+pad(d);r={id:y+'-'+m+'-'+d,y,m,d,ds,aid:'',name:'',type:'خاص',un:'N',dd:'',status:'Pending',note:'',_e:false};rows.push(r);sr();}
  else if(r._e){r._e=false;sr();}
  return r;
}
function calcDue(od,un){
  const days=un==='U'?cfg.u:cfg.n;const hol=cfg.hol||[5,6];
  let dt=new Date(od),added=0;
  while(added<days){dt.setDate(dt.getDate()+1);if(!hol.includes(dt.getDay()))added++;}
  return dt.toISOString().split('T')[0];
}
const TR={
  ar:{dash:'الرئيسية',ord:'الطلبات',set:'الإعدادات',s0:'الكل',s1:'منجز',s2:'انتظار',s3:'متأخر',s4:'تعديل',tod:'طلبات اليوم والمتأخرة',todE:'لا توجد طلبات اليوم',th0:'Account ID',th1:'الاسم',th2:'النوع',th3:'تاريخ الطلب',th4:'U/N',th5:'موعد التسليم',th6:'اليوم',th7:'الحالة',th8:'ملاحظة',sh0:'إعدادات المتجر',sh1:'اسم المتجر',sh2:'أيام التسليم',sh3:'مستعجل (U) — أيام',sh4:'عادي (N) — أيام',sh5:'أيام الإجازة',sh6:'المستخدمون',sh7:'إضافة',sh8:'حفظ الإعدادات',noO:'لا توجد إدخالات',days:DAR,months:MAR},
  en:{dash:'Dashboard',ord:'Orders',set:'Settings',s0:'All',s1:'Done',s2:'Pending',s3:'Late',s4:'Edit',tod:"Today's & Overdue",todE:'No orders today',th0:'Account ID',th1:'Name',th2:'Type',th3:'Order Date',th4:'U/N',th5:'Due Date',th6:'Day',th7:'Status',th8:'Note',sh0:'Store Settings',sh1:'Store Name',sh2:'Delivery Days',sh3:'Urgent (U) — Days',sh4:'Normal (N) — Days',sh5:'Holiday Days',sh6:'Users',sh7:'Add',sh8:'Save Settings',noO:'No entries',days:DEN,months:MEN}
};
const t=k=>TR[lang][k]||k;
function applyLang(){
  document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.getElementById('apit').textContent=lang==='ar'?'متابعة الطلبات':'Order Tracker';
  document.getElementById('ltit').textContent=lang==='ar'?'متابعة الطلبات':'Order Tracker';
  ['tp-dash','tp-orders','tp-settings'].forEach((id,i)=>document.getElementById(id).textContent=t(['dash','ord','set'][i]));
  ['sl0','sl1','sl2','sl3','sl4'].forEach((id,i)=>document.getElementById(id).textContent=t('s'+i));
  document.getElementById('todH').textContent=t('tod');
  for(let i=0;i<=8;i++){const e=document.getElementById('th'+i);if(e)e.textContent=t('th'+i);}
  for(let i=0;i<=8;i++){const e=document.getElementById('sh'+i);if(e)e.textContent=t('sh'+i);}
  renderDg();renderMbar();renderSheet();renderDash();
}
function toggleLang(){lang=lang==='ar'?'en':'ar';applyLang();}
function doLogin(){
  const email=document.getElementById('le').value.trim().toLowerCase();
  const pass=document.getElementById('lp').value;
  const user=users.find(u=>u.email.toLowerCase()===email&&u.pass===pass);
  if(user){cu=user;document.getElementById('lw').style.display='none';document.getElementById('app').classList.add('on');document.getElementById('tbu').textContent=user.email;document.getElementById('lerr').classList.add('hidden');loadCfgUI();renderDash();renderMbar();}
  else{document.getElementById('lerr').classList.remove('hidden');}
}
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function doLogout(){cu=null;document.getElementById('lw').style.display='flex';document.getElementById('app').classList.remove('on');}
function showTab(tab){
  ['dash','orders','settings'].forEach(t=>{document.getElementById('pg-'+t).classList.add('hidden');document.getElementById('tp-'+t).classList.remove('on');});
  document.getElementById('pg-'+tab).classList.remove('hidden');document.getElementById('tp-'+tab).classList.add('on');
  if(tab==='orders'){renderMbar();renderSheet();}if(tab==='dash')renderDash();if(tab==='settings')loadCfgUI();
}
function loadCfgUI(){document.getElementById('cfgs').value=cfg.store||'';document.getElementById('cfgu').value=cfg.u;document.getElementById('cfgn').value=cfg.n;renderDg();renderUL();}
function renderDg(){const days=t('days');document.getElementById('dg').innerHTML=days.map((d,i)=>`<button class="db ${(cfg.hol||[]).includes(i)?'on':''}" onclick="toggleDay(${i})">${d}</button>`).join('');}
function toggleDay(i){if(!cfg.hol)cfg.hol=[];const idx=cfg.hol.indexOf(i);if(idx>=0)cfg.hol.splice(idx,1);else cfg.hol.push(i);renderDg();}
function saveSettings(){cfg.store=document.getElementById('cfgs').value;cfg.u=parseInt(document.getElementById('cfgu').value)||2;cfg.n=parseInt(document.getElementById('cfgn').value)||8;sc();alert(lang==='ar'?'تم الحفظ ✓':'Saved ✓');}
function renderUL(){document.getElementById('ul').innerHTML=users.map((u,i)=>`<div class="ui"><span>${u.email}${u.role==='admin'?' 👑':''}</span>${u.email!==cu.email?'<button class="rb" onclick="rmUser('+i+')">×</button>':''}</div>`).join('');}
function addUser(){const e=document.getElementById('nue').value.trim();const p=document.getElementById('nup').value;if(!e||!p)return;if(users.find(u=>u.email.toLowerCase()===e.toLowerCase()))return alert('موجود بالفعل');users.push({email:e,pass:p,role:'user'});su();document.getElementById('nue').value='';document.getElementById('nup').value='';renderUL();}
function rmUser(i){users.splice(i,1);su();renderUL();}
function renderMbar(){
  const now=new Date();const ms=[];
  for(let i=-3;i<=6;i++){let m=now.getMonth()+i,y=now.getFullYear();if(m<0){m+=12;y--;}else if(m>11){m-=12;y++;}ms.push({m,y});}
  const mn=t('months');
  document.getElementById('mbar').innerHTML=ms.map(({m,y})=>`<button class="mt ${m===cm&&y===cy?'on':''}" onclick="setMonth(${m},${y})">${mn[m]} ${y}</button>`).join('');
}
function setMonth(m,y){cm=m;cy=y;renderMbar();renderSheet();}
function setF(f){cf=f;['all','Pending','Late','Done','Edit'].forEach(ff=>document.getElementById('ft-'+ff)?.classList.remove('on'));document.getElementById('ft-'+f)?.classList.add('on');renderSheet();}
function renderSheet(){
  const search=(document.getElementById('sin')?.value||'').toLowerCase();
  const today=new Date();today.setHours(0,0,0,0);
  const mrows=getMonthRows(cy,cm);const days=t('days');
  const filtered=mrows.filter(r=>{if(cf!=='all'&&(!r.status||r.status!==cf))return false;if(search&&!Object.values(r).some(v=>String(v).toLowerCase().includes(search)))return false;return true;});
  const tbody=document.getElementById('shb');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="10" class="empty">'+t('noO')+'</td></tr>';return;}
  tbody.innerHTML=filtered.map(r=>{
    const due=r.dd?new Date(r.dd):null;const dueD=due?new Date(due):null;if(dueD)dueD.setHours(0,0,0,0);
    const isLate=dueD&&dueD<today&&r.status&&r.status!=='Done';
    const rc=isLate?'rl':r.status==='Done'?'rd':r.status==='Pending'?'rp':'';
    const dayName=r.dd?days[new Date(r.dd).getDay()]:'';
    const unC=r.un==='U'?'u':r.un==='N'?'n':'';
    const stC={'Done':'done','Pending':'pending','Late':'late','Edit':'edit'}[r.status]||'';
    const lateStyle=isLate?'color:#ef476f;font-weight:600;':'';
    return '<tr class="'+rc+'"><td>'+r.d+'</td>'+
      '<td><input class="ci" value="'+esc(r.aid)+'" onchange="upd(\''+r.id+'\',\'aid\',this.value,'+r.d+')"></td>'+
      '<td><input class="ci" value="'+esc(r.name)+'" onchange="upd(\''+r.id+'\',\'name\',this.value,'+r.d+')"></td>'+
      '<td><select class="cs" onchange="upd(\''+r.id+'\',\'type\',this.value,'+r.d+')"><option value=""></option><option '+(r.type==='خاص'?'selected':'')+'>خاص</option><option '+(r.type==='معروض'?'selected':'')+'>معروض</option><option '+(r.type==='أخرى'?'selected':'')+'>أخرى</option></select></td>'+
      '<td><input class="cd" type="date" value="'+esc(r.ds)+'" style="'+lateStyle+'" onchange="updOD(\''+r.id+'\',this.value,'+r.d+')"></td>'+
      '<td><select class="un '+unC+'" onchange="updUN(\''+r.id+'\',this.value,'+r.d+');this.className=\'un \'+(this.value===\'U\'?\'u\':this.value===\'N\'?\'n\':\'\')"><option value=""></option><option value="U" '+(r.un==='U'?'selected':'')+'>U</option><option value="N" '+(r.un==='N'?'selected':'')+'>N</option></select></td>'+
      '<td><input class="cd" type="date" value="'+esc(r.dd)+'" style="'+lateStyle+'" onchange="upd(\''+r.id+'\',\'dd\',this.value,'+r.d+');renderSheet()"></td>'+
      '<td style="padding:0 7px;font-size:11px;color:var(--m);">'+dayName+'</td>'+
      '<td><select class="st '+stC+'" onchange="upd(\''+r.id+'\',\'status\',this.value,'+r.d+');this.className=\'st \'+(({Done:\'done\',Pending:\'pending\',Late:\'late\',Edit:\'edit\'})[this.value]||\'\');renderDash()"><option value=""></option><option '+(r.status==='Pending'?'selected':'')+'>Pending</option><option '+(r.status==='Done'?'selected':'')+'>Done</option><option '+(r.status==='Edit'?'selected':'')+'>Edit</option><option '+(r.status==='Late'?'selected':'')+'>Late</option></select></td>'+
      '<td><input class="ci" value="'+esc(r.note)+'" onchange="upd(\''+r.id+'\',\'note\',this.value,'+r.d+')"></td></tr>';
  }).join('');
}
function esc(s){return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function upd(id,field,val,d){let r=rows.find(r=>r.id===id);if(!r){r=ensureRow(cy,cm,d);}else if(r._e){r._e=false;}r[field]=val;sr();}
function updOD(id,val,d){let r=rows.find(r=>r.id===id);if(!r)r=ensureRow(cy,cm,d);r.ds=val;if(r.un)r.dd=calcDue(val,r.un);sr();renderSheet();}
function updUN(id,val,d){let r=rows.find(r=>r.id===id);if(!r)r=ensureRow(cy,cm,d);r.un=val;if(r.ds)r.dd=calcDue(r.ds,val);sr();renderSheet();}
function renderDash(){
  const today=new Date();today.setHours(0,0,0,0);const active=rows.filter(r=>!r._e);
  document.getElementById('st0').textContent=active.length;
  document.getElementById('st1').textContent=active.filter(r=>r.status==='Done').length;
  document.getElementById('st2').textContent=active.filter(r=>r.status==='Pending').length;
  document.getElementById('st3').textContent=active.filter(r=>r.status==='Late'||(r.dd&&new Date(r.dd)<today&&r.status&&r.status!=='Done')).length;
  document.getElementById('st4').textContent=active.filter(r=>r.status==='Edit').length;
  const due=active.filter(r=>{if(!r.status||r.status==='Done'||!r.dd)return false;const d=new Date(r.dd);d.setHours(0,0,0,0);return d<=today;});
  const list=document.getElementById('todL');
  if(!due.length){list.innerHTML='<div class="empty">'+t('todE')+'</div>';return;}
  list.innerHTML='<table style="width:100%;border-collapse:collapse;"><thead><tr>'+['th0','th1','th5','th7'].map(k=>'<th style="text-align:right;padding:5px 7px;font-size:10px;color:var(--m);font-weight:600;">'+t(k)+'</th>').join('')+'</tr></thead><tbody>'+due.map(r=>{const d=new Date(r.dd);d.setHours(0,0,0,0);const over=d<today;const sc={'Done':'#05a87f','Pending':'#b97d0a','Late':'#c9184a','Edit':'#0277bd'}[r.status]||'#888';return'<tr style="'+(over?'background:#fff5f7':'')+'"><td style="padding:5px 7px;font-size:12px;font-weight:600;">'+(r.aid||'-')+'</td><td style="padding:5px 7px;font-size:12px;">'+(r.name||'-')+'</td><td style="padding:5px 7px;font-size:11px;color:'+(over?'var(--r)':'var(--m)')+';">'+r.dd+(over?' ⚠️':'')+'</td><td style="padding:5px 7px;font-size:11px;font-weight:700;color:'+sc+';">'+r.status+'</td></tr>';}).join('')+'</tbody></table>';
}
applyLang();
</script>
</body>
</html>
